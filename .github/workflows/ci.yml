name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # Install only the lightweight CI requirements — NOT the full
      # requirements.txt which contains torch/bitsandbytes/trl (multi-GB,
      # CUDA-only packages that are irrelevant for unit-testing pure Python
      # logic like metrics, formatters, and preference builders).
      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Lint with ruff
        run: ruff check src/ scripts/ tests/

      - name: Format check with black
        run: black --check src/ scripts/ tests/

      - name: Run unit tests (no GPU required)
        run: pytest tests/ -v --tb=short --cov=src --cov-report=xml
        env:
          # Prevent any accidental network calls to HuggingFace during tests
          HF_DATASETS_OFFLINE: "1"
          TRANSFORMERS_OFFLINE: "1"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: coverage.xml
          fail_ci_if_error: false
